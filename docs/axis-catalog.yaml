# kaixn — Engineering axis catalog (seed registry)
#
# The "what to look for" — the global, cross-repo registry of engineering axes.
# A norm in a repo's handbook is an INSTANCE of one of these (its observed/ratified
# value). See docs/engineering-handbook-design.md for the model.
#
# Per-axis schema:
#   id:        stable key
#   q:         the reviewer's question this axis answers
#   values:    example value-space (illustrative, not exhaustive)
#   extractor: det (deterministic AST/parse) | hist (git history) | llm (semantic) | catalog (lint/SAST rule)
#   source:    snapshot | history | process | catalog | meta
#   tier:      advisory (descriptive/observed) | governed (normative/principle) | either
#
# Comprehensive by construction: this seed is grown via import(rule catalogs) +
# specialize(team lint config + PR/override history) + anchored meta-discovery.

style:
  - {id: naming-case,        q: "What casing do identifiers use (func/var/class/const)?", values: [snake_case, camelCase, PascalCase, SCREAMING_SNAKE], extractor: det,     source: snapshot, tier: advisory}
  - {id: file-naming,        q: "How are files/modules named?",                            values: [snake_case, kebab-case],                          extractor: det,     source: snapshot, tier: advisory}
  - {id: import-organization,q: "How are imports ordered/grouped (abs vs rel)?",           values: [grouped-stdlib-3p-local, absolute-only],          extractor: det,     source: snapshot, tier: advisory}
  - {id: formatter,          q: "What formats/lints the code?",                            values: [ruff, black, none],                               extractor: det,     source: snapshot, tier: advisory}
  - {id: docstring-style,    q: "Do modules/functions carry docstrings, what style?",      values: [module+public, google, numpy, none],              extractor: det,     source: snapshot, tier: advisory}
  - {id: type-annotations,   q: "Are public functions type-annotated?",                    values: [full, partial, none],                             extractor: det,     source: snapshot, tier: advisory}
  - {id: future-annotations, q: "Is `from __future__ import annotations` declared?",       values: [all-modules, some, none],                         extractor: det,     source: snapshot, tier: advisory}
  - {id: comment-rationale,  q: "Do comments explain WHY, not what?",                       values: [why-focused, sparse],                             extractor: llm,     source: snapshot, tier: advisory}

structure:
  - {id: module-responsibility, q: "Does each module have a single clear responsibility?", values: [single, mixed],                                  extractor: llm,     source: snapshot, tier: governed}
  - {id: layering-direction,    q: "Which way do dependencies point (callers→seam)?",       values: [inward-to-seams, layered, tangled],              extractor: llm,     source: snapshot, tier: governed}
  - {id: seam-pattern,          q: "How are swap points defined?",                          values: [typing.Protocol, ABC, duck],                     extractor: llm,     source: snapshot, tier: advisory}
  - {id: dependency-injection,  q: "How are dependencies provided?",                        values: [constructor, global, factory, env-switch],       extractor: llm,     source: snapshot, tier: advisory}
  - {id: impl-pairing,          q: "Does every seam ship an in-memory/heuristic + real impl?", values: [paired, single],                             extractor: llm,     source: snapshot, tier: advisory}
  - {id: offline-fallback,      q: "Does every LLM/external path have a deterministic fallback?", values: [always, sometimes, never],                extractor: llm,     source: snapshot, tier: governed}
  - {id: package-layout,        q: "What is the source layout?",                            values: [src-layout, flat],                               extractor: det,     source: snapshot, tier: advisory}
  - {id: config-management,     q: "How is configuration sourced?",                         values: [env-vars, toml-file, constants],                 extractor: det,     source: snapshot, tier: advisory}
  - {id: public-surface,        q: "What defines the public API of a module?",              values: [__all__, leading-underscore-private],            extractor: det,     source: snapshot, tier: advisory}

correctness:
  - {id: error-signaling,    q: "How are failures signaled?",                              values: [raise, return-result, error-code],                extractor: llm,     source: snapshot, tier: governed}
  - {id: error-propagation,  q: "Are errors swallowed or propagated with context?",         values: [propagated-with-cause, swallowed],               extractor: llm,     source: snapshot, tier: governed}
  - {id: input-validation,   q: "Where are inputs validated?",                             values: [at-boundary, scattered, none],                   extractor: llm,     source: snapshot, tier: governed}
  - {id: none-handling,      q: "How is None/absence handled?",                            values: [explicit-optional, sentinel, unchecked],          extractor: llm,     source: snapshot, tier: governed}
  - {id: state-mutation,     q: "Is state mutated in place or append-only/immutable?",      values: [append-only, in-place],                          extractor: llm,     source: snapshot, tier: governed}
  - {id: idempotency,        q: "Are repeatable operations idempotent?",                   values: [idempotent, not],                                extractor: llm,     source: snapshot, tier: governed}
  - {id: concurrency-model,  q: "What is the concurrency model & is it race-safe?",         values: [sync, async, threaded],                          extractor: llm,     source: snapshot, tier: governed}
  - {id: resource-lifecycle, q: "Are resources closed/cleaned (context managers)?",         values: [context-managed, manual, leaky],                 extractor: llm,     source: snapshot, tier: governed}

data:
  - {id: data-access,        q: "How is data fetched (seam vs inline)?",                   values: [reader-seam, inline-sql, orm],                    extractor: llm,     source: snapshot, tier: governed}
  - {id: query-construction, q: "Are queries parameterized?",                              values: [parameterized, string-concat],                    extractor: catalog, source: catalog,  tier: governed}
  - {id: transaction-boundaries, q: "Where are transaction boundaries drawn?",            values: [per-request, per-op, autocommit],                extractor: llm,     source: snapshot, tier: governed}
  - {id: migration-strategy, q: "How are schema changes shipped?",                         values: [numbered-sql-append-only, orm-autogen, adhoc],   extractor: det+hist, source: snapshot, tier: governed}
  - {id: schema-sot,         q: "What is the schema source of truth?",                     values: [sql-migrations, orm-models],                     extractor: det,     source: snapshot, tier: governed}
  - {id: serialization,      q: "What serialization format/lib is standard?",             values: [pydantic, dataclass, json],                      extractor: det,     source: snapshot, tier: advisory}
  - {id: time-handling,      q: "How are time/timezones handled?",                         values: [utc-aware, naive-local],                         extractor: llm,     source: snapshot, tier: governed}
  - {id: numeric-money,      q: "How are money/precise numbers represented?",              values: [decimal, int-cents, float],                      extractor: llm,     source: snapshot, tier: governed}

api:
  - {id: response-shape,     q: "What is the standard response envelope?",                 values: [bare, enveloped, problem-details],               extractor: llm,     source: snapshot, tier: advisory}
  - {id: error-response,     q: "What is the standard error format?",                      values: [problem-details, ad-hoc],                        extractor: llm,     source: snapshot, tier: governed}
  - {id: versioning,         q: "How is the API versioned?",                              values: [url-path, header, none],                         extractor: llm,     source: snapshot, tier: governed}
  - {id: pagination,         q: "How is list pagination done?",                           values: [cursor, offset, none],                           extractor: llm,     source: snapshot, tier: advisory}
  - {id: status-codes,       q: "Are HTTP status codes used semantically?",               values: [semantic, 200-always],                           extractor: llm,     source: snapshot, tier: advisory}
  - {id: backward-compat,    q: "What is the backward-compatibility policy?",             values: [additive-only, breaking-allowed],                extractor: process, source: process,  tier: governed}

security:
  - {id: secrets-handling,   q: "How are secrets provided?",                              values: [env, secret-manager, literal],                   extractor: det,     source: snapshot, tier: governed}
  - {id: injection-safety,   q: "Are SQL/command/path injections prevented?",             values: [parameterized-safe, vulnerable],                 extractor: catalog, source: catalog,  tier: governed}
  - {id: authz-boundary,     q: "Where is authorization enforced?",                       values: [central-boundary, scattered, none],              extractor: llm,     source: snapshot, tier: governed}
  - {id: authn-pattern,      q: "How is authentication done?",                            values: [jwt, session, none],                             extractor: llm,     source: snapshot, tier: governed}
  - {id: pii-handling,       q: "How is PII handled/redacted?",                           values: [redacted, logged-raw],                           extractor: llm,     source: snapshot, tier: governed}
  - {id: crypto-usage,       q: "Is crypto used correctly (no homegrown)?",               values: [vetted-lib, homegrown],                          extractor: catalog, source: catalog,  tier: governed}
  - {id: trust-boundary,     q: "Is external input validated at trust boundaries?",       values: [strict, lax],                                    extractor: llm,     source: snapshot, tier: governed}

performance:
  - {id: n-plus-one,         q: "Are N+1 query/loop patterns avoided?",                   values: [batched, n-plus-one],                            extractor: catalog, source: catalog,  tier: governed}
  - {id: blocking-io,        q: "Is blocking I/O kept off hot/async paths?",              values: [non-blocking, blocking],                         extractor: llm,     source: snapshot, tier: governed}
  - {id: caching,            q: "What is cached and how?",                                values: [explicit-cache, none],                           extractor: llm,     source: snapshot, tier: advisory}
  - {id: indexing,           q: "Are DB access patterns indexed?",                        values: [indexed, unindexed],                             extractor: det,     source: snapshot, tier: governed}
  - {id: complexity,         q: "Is algorithmic complexity reasonable for the path?",     values: [bounded, quadratic-hotpath],                     extractor: llm,     source: snapshot, tier: governed}

reliability:
  - {id: logging-pattern,    q: "Is logging structured & consistent?",                    values: [structured, print, none],                        extractor: det,     source: snapshot, tier: advisory}
  - {id: observability,      q: "Are metrics/traces emitted?",                            values: [instrumented, none],                             extractor: llm,     source: snapshot, tier: advisory}
  - {id: retry-backoff,      q: "Are external calls retried with backoff?",               values: [retry-backoff, none],                            extractor: llm,     source: snapshot, tier: governed}
  - {id: timeouts,           q: "Do external calls set timeouts?",                        values: [explicit-timeout, none],                         extractor: llm,     source: snapshot, tier: governed}
  - {id: graceful-degradation, q: "Does the system degrade gracefully (e.g. offline)?",   values: [graceful, hard-fail],                            extractor: llm,     source: snapshot, tier: governed}
  - {id: feature-flags,      q: "Are risky changes gated behind flags/config?",           values: [flagged, direct],                                extractor: llm,     source: snapshot, tier: advisory}

testing:
  - {id: tests-first,        q: "Are tests written before/with implementation?",          values: [tdd, after, sparse],                             extractor: hist,    source: history,  tier: governed}
  - {id: test-mirroring,     q: "Does each module have a mirrored test file?",            values: [mirrored, partial],                              extractor: det,     source: snapshot, tier: governed}
  - {id: test-doubles,       q: "Fakes vs mocks for collaborators?",                      values: [fakes, mocks, real],                             extractor: llm,     source: snapshot, tier: advisory}
  - {id: test-determinism,   q: "Do tests run offline/deterministically (no keys/net)?",  values: [deterministic, network-dependent],               extractor: llm,     source: snapshot, tier: governed}
  - {id: edge-case-tests,    q: "Are edge/error cases tested, not just happy path?",      values: [thorough, happy-only],                           extractor: llm,     source: snapshot, tier: governed}
  - {id: coverage-expectation, q: "Is there a coverage bar/gate?",                        values: [gated, none],                                    extractor: process, source: process,  tier: governed}

dependencies:
  - {id: dependency-choice,  q: "Which libraries are the standard choices?",              values: ["<per-lib>"],                                    extractor: det,     source: snapshot, tier: governed}
  - {id: version-pinning,    q: "How are dependency versions pinned?",                    values: [lower-bound, exact-lock, unpinned],              extractor: det,     source: snapshot, tier: advisory}
  - {id: optional-deps,      q: "How are optional capabilities split out?",              values: [extras, all-required],                           extractor: det,     source: snapshot, tier: advisory}
  - {id: license-policy,     q: "What license / dependency-license policy applies?",      values: ["<license>"],                                    extractor: det,     source: snapshot, tier: governed}

documentation:
  - {id: module-docstrings,  q: "Do modules open with an explanatory docstring?",         values: [always, sometimes],                              extractor: det,     source: snapshot, tier: advisory}
  - {id: adr-for-decisions,  q: "Are significant decisions recorded (ADR/docs)?",         values: [adr, docs, none],                                extractor: hist,    source: history,  tier: governed}
  - {id: evidence-provenance,q: "Do derived/extracted records carry source evidence?",    values: [evidence-required, none],                        extractor: llm,     source: snapshot, tier: governed}
  - {id: readme-maintained,  q: "Is the README kept current with the code?",             values: [current, stale],                                 extractor: hist,    source: history,  tier: advisory}

maintainability:
  - {id: function-complexity,q: "Are functions kept short / low-complexity?",            values: [small, large],                                   extractor: catalog, source: catalog,  tier: governed}
  - {id: duplication,        q: "Is duplication avoided (DRY)?",                          values: [dry, duplicated],                                extractor: catalog, source: catalog,  tier: governed}
  - {id: dead-code,          q: "Is dead/unused code removed?",                          values: [clean, dead-present],                            extractor: catalog, source: catalog,  tier: advisory}
  - {id: atomic-records,     q: "Are records atomic (one claim/one change)?",            values: [atomic, compound],                               extractor: llm,     source: snapshot, tier: governed}
  - {id: consistency,        q: "Does new code match surrounding conventions?",          values: [consistent, divergent],                          extractor: llm,     source: snapshot, tier: governed}

# ~75 seeded axes across 12 categories. Grows via rule-catalog import (ruff/OWASP/
# semgrep), team specialization (lint config + PR/override history), and anchored
# meta-discovery. extractor=catalog axes map to existing lint/SAST rule IDs.

# ===========================================================================
# GENERATION-GRADE AXES  (for zero-comment code generation)
# ---------------------------------------------------------------------------
# The axes above say WHAT dimension to look at. These say WHAT THE RULE IS and
# HOW A VIOLATION IS CAUGHT — the level an agent needs to emit reviewable code.
# Extra fields:
#   rule:        the concrete decision an agent must follow
#   enforce:     mypy-strict | ruff:<rules> | custom-check:<name> | test:<pattern> | human
#   enforceable: invariant (mechanical) | convention (judgment)
# Honesty: enforce=human ⇒ enforceable=convention ⇒ backlog a real check or downgrade.
# ===========================================================================

type_system:
  - {id: type-strict,        rule: "mypy --strict passes; no implicit Any",                    enforce: "mypy-strict",        enforceable: invariant}
  - {id: type-any-policy,    rule: "`Any` banned except explicit `# type: ignore[code]` + justification", enforce: "ruff:ANN401 + mypy-strict", enforceable: invariant}
  - {id: type-model-choice,  rule: "TypedDict=loose JSON shapes; dataclass(slots)=internal value types; pydantic=API boundary only", enforce: "custom-check:model-choice", enforceable: convention}
  - {id: type-cast-usage,    rule: "cast() only to narrow a known-safe union, never to silence checker", enforce: "human", enforceable: convention}
  - {id: type-generics,      rule: "TypeVar for containers, ParamSpec for decorators; never Any as a generic escape", enforce: "mypy-strict + human", enforceable: convention}
  - {id: type-overload,      rule: "@overload required when return type varies by argument type", enforce: "mypy-strict", enforceable: invariant}

error_architecture:
  - {id: err-taxonomy,       rule: "custom exceptions subclass a base KaixnError in errors.py; builtins only for truly generic cases", enforce: "custom-check:exc-base", enforceable: invariant}
  - {id: err-broad-except,   rule: "no bare `except Exception` except at the web boundary, which must log + convert", enforce: "ruff:BLE001", enforceable: invariant}
  - {id: err-assert-prod,    rule: "no `assert` for runtime validation (stripped by -O); assert only for programmer-error invariants", enforce: "ruff:S101", enforceable: invariant}
  - {id: err-chaining,       rule: "always `raise X from e` (or `from None` to deliberately suppress)", enforce: "ruff:B904", enforceable: invariant}
  - {id: err-degraded-shape, rule: "fallback shape: try real → on failure log warning → return deterministic impl", enforce: "test:fallback-shape", enforceable: invariant}

function_design:
  - {id: fn-arg-count,       rule: ">3 positional args → take a dataclass/config object", enforce: "ruff:PLR0913", enforceable: invariant}
  - {id: fn-guard-clauses,   rule: "early-return preconditions; no deep if/else nesting", enforce: "ruff:SIM102+C901", enforceable: invariant}
  - {id: fn-bool-arg,        rule: "no boolean selector args (split into two functions)", enforce: "ruff:FBT", enforceable: invariant}
  - {id: fn-mutate-or-return,rule: "a function mutates its args OR returns a new value, never both", enforce: "custom-check:mutate-or-return", enforceable: convention}
  - {id: fn-complexity,      rule: "cyclomatic complexity <= 10", enforce: "ruff:C901", enforceable: invariant}

seam_contract:
  - {id: seam-surface,       rule: "concrete impls expose nothing public beyond the Protocol; extras are _private", enforce: "custom-check:protocol-surface", enforceable: invariant}
  - {id: seam-runtime-check, rule: "Protocols are static-only; no @runtime_checkable unless isinstance is genuinely needed", enforce: "ruff/custom", enforceable: convention}
  - {id: seam-new-protocol,  rule: "new Protocol only when >=2 impls exist or are planned; else concrete", enforce: "human", enforceable: convention}

sql_contract:
  - {id: sql-no-loop-query,  rule: "no query inside a loop; bulk via IN / executemany", enforce: "custom-check:n-plus-one", enforceable: invariant}
  - {id: sql-row-mapping,    rule: "rows → domain type via one canonical mapper, not ad-hoc per query", enforce: "custom-check:row-mapper", enforceable: convention}
  - {id: sql-null-coercion,  rule: "nullable column → Optional[...] at the mapping layer", enforce: "mypy-strict + human", enforceable: convention}
  - {id: sql-multistep-atomicity, rule: "multi-write ops wrap an explicit transaction despite autocommit default", enforce: "custom-check:txn-scope", enforceable: invariant}

concurrency_safety:
  - {id: conc-shared-state,  rule: "no mutable module/class-level state shared across requests", enforce: "custom-check:shared-mutable", enforceable: invariant}
  - {id: conc-subprocess,    rule: "all subprocess calls via a canonical run() wrapper with a timeout", enforce: "custom-check:subprocess-wrapper", enforceable: invariant}
  - {id: conc-async-policy,  rule: "no `async def` in core/domain layers; async only at the FastAPI route layer", enforce: "custom-check:async-layer", enforceable: invariant}

mutation_invariants:
  - {id: mut-no-direct,      rule: "persisted-record status changes only via set_status/supersede; no direct field assignment", enforce: "custom-check:no-direct-mutation", enforceable: invariant}
  - {id: mut-state-machine,  rule: "valid status transitions enumerated; guards reference the enum", enforce: "test:state-transitions", enforceable: invariant}
  - {id: mut-duplicate,      rule: "duplicate write: deterministic (same derived content) → upsert (idempotent); non-deterministic collision → raise", enforce: "test:duplicate-policy", enforceable: invariant}

privacy_naming:
  - {id: priv-module-extract,rule: "private helper earns its own _<name>.py when large or reused", enforce: "human", enforceable: convention}
  - {id: priv-no-mangling,   rule: "single leading underscore only; no __dunder name-mangling", enforce: "custom-check:no-dunder", enforceable: invariant}
  - {id: priv-test-private,  rule: "private funcs tested via the public surface; else make module-public", enforce: "human", enforceable: convention}

serialization_boundary:
  - {id: ser-boundary,       rule: "pydantic only at/above the web layer, never below; dataclasses never self-serialize to JSON — convert at the boundary", enforce: "custom-check:pydantic-layer", enforceable: invariant}
  - {id: ser-conversion,     rule: "canonical conversion call site (model_validate / _to_dict), not per-route", enforce: "human", enforceable: convention}
  - {id: ser-validators,     rule: "field constraints via pydantic validators at API; domain validation in the domain layer", enforce: "human", enforceable: convention}

fallback_shape:
  - {id: fb-factory-sig,     rule: "from_env returns the Protocol type; never raises for missing OPTIONAL keys (falls back); raises only on malformed REQUIRED config", enforce: "test:from-env", enforceable: invariant}
  - {id: fb-degraded-signal, rule: "fallback logs a warning (never silent)", enforce: "custom-check:fallback-warns", enforceable: invariant}
  - {id: fb-both-tested,     rule: "both impls tested independently; in-memory is not a proxy for the real one", enforce: "test:both-impls", enforceable: invariant}

# Generation-grade axes are the per-PR gate's mechanical checklist. invariant axes
# COMPILE to the gate (mypy-strict config + ruff selection + custom checks + tests);
# convention axes remain LLM/human judgment.

# === eval-discovered axes (round 1) ===
eval_discovered_round1:
  - {id: warning-stacklevel,  rule: "warnings.warn must set stacklevel so the emitted warning points at the user's call site, not at internal framework/library frames (e.g. account for Pydantic model_validator and BaseModel.__init__ frames)", enforce: "human", enforceable: convention}

# === guideline-derived axes: portable subset (curated from torvalds/linux) ===
# Python-focus curation: kept the language-agnostic engineering standards (commit/PR
# hygiene, logging/diagnostics discipline, review etiquette, docs, AI-contribution
# policy) + the 3 axes mapping to REAL linter rules. Dropped ~57 LKML/email/C-kernel
# specifics (DCO sign-off & trailer formats, Fixes:/Link:/lore.kernel.org mechanics,
# email patch/reply etiquette, C namespacing/refcount/locking-primitives, switch
# fall-through). Enforcement honesty: only ruff/mypy-mapped axes are `invariant`;
# scriptable-but-unbuilt checks are `enforce: planned:<name>` / `convention`.
guideline_portable:
  # --- code clarity / source hygiene ---
  - {id: expression-simplicity,   rule: "Prefer simple, explicit expressions; avoid clever constructs that obscure intent", enforce: "human", enforceable: convention}
  - {id: string-greppability,     rule: "Keep user-visible/log strings on a single source line so messages stay greppable", enforce: "planned:no-split-strings", enforceable: convention}
  - {id: magic-numbers,           rule: "No unexplained literal numeric constants; use a named constant or enum member", enforce: "ruff:PLR2004", enforceable: invariant}
  - {id: line-length,             rule: "Lines kept within a soft max width; prefer extracting helpers over deep line-wrapping", enforce: "ruff:E501", enforceable: invariant}
  - {id: comment-placement,       rule: "Freestanding comments on their own line above the code, not trailing tail comments", enforce: "human", enforceable: convention}
  - {id: name-descriptiveness,    rule: "Identifiers convey intent well enough to reduce the need for explanatory comments", enforce: "human", enforceable: convention}
  - {id: understand-before-change, rule: "Understand how existing code works before modifying it", enforce: "human", enforceable: convention}
  # --- correctness / concurrency (portable) ---
  - {id: locking-rules-documented, rule: "Document the concurrency invariants / locking rules for shared mutable state", enforce: "human", enforceable: convention}
  - {id: regression-avoidance,    rule: "Changes must not break existing users; never fix a bug by introducing another", enforce: "human", enforceable: convention}
  - {id: new-public-interface-rigor, rule: "New public/user-facing interfaces need design, docs, and wide review before merge", enforce: "human", enforceable: convention}
  # --- diagnostics / logging / messages ---
  - {id: message-spelling,        rule: "Log/diagnostic/user-facing messages are correctly spelled", enforce: "planned:spellcheck-messages", enforceable: convention}
  - {id: message-clarity,         rule: "Log/diagnostic messages are concise, clear, and unambiguous", enforce: "human", enforceable: convention}
  - {id: log-verbosity,           rule: "Quiet during normal operation; routine status at debug level, higher severities for real problems", enforce: "human", enforceable: convention}
  - {id: no-redundant-error-logging, rule: "No redundant failure message when the failing call already logs the failure", enforce: "human", enforceable: convention}
  - {id: diagnostic-severity-fit, rule: "Loud diagnostics (warn/assert) only for genuinely unexpected conditions, never expected states", enforce: "human", enforceable: convention}
  # --- commit / PR description content ---
  - {id: commit-problem-statement, rule: "Every commit/PR states the underlying problem and why it is worth fixing", enforce: "human", enforceable: convention}
  - {id: commit-impact-description, rule: "Every commit/PR states the user-visible impact, not just code-level details", enforce: "human", enforceable: convention}
  - {id: commit-claim-evidence,   rule: "Performance/optimization claims cite measured numbers", enforce: "human", enforceable: convention}
  - {id: commit-tradeoff-disclosure, rule: "Descriptions state the non-obvious costs/trade-offs of a change", enforce: "human", enforceable: convention}
  - {id: commit-msg-descriptive,  rule: "Describe what the change does in technical detail and plain English so reviewers can verify", enforce: "human", enforceable: convention}
  - {id: commit-self-contained,   rule: "Each (re)submission carries a complete, self-contained description; no reliance on prior versions", enforce: "human", enforceable: convention}
  - {id: commit-changelog-rationale, rule: "The commit message explains WHY the change is worth applying, not just what it does", enforce: "human", enforceable: convention}
  - {id: change-justification,    rule: "Every change, especially new features, justifies why it is needed", enforce: "human", enforceable: convention}
  - {id: changelog-testing,       rule: "Description reports the testing performed and its results", enforce: "human", enforceable: convention}
  - {id: changelog-structure,     rule: "Commit bodies are structured context -> problem -> solution, not one undivided block", enforce: "human", enforceable: convention}
  - {id: durable-references,      rule: "Reference durable/archived copies of external docs, not fragile URLs that rot", enforce: "human", enforceable: convention}
  # --- commit subject / format (scriptable, not yet built) ---
  - {id: commit-imperative-mood,  rule: "Commit subject and description use the imperative mood ('make X do Y')", enforce: "planned:commit-msg-lint", enforceable: convention}
  - {id: commit-subject-capitalization, rule: "Commit subject begins with an uppercase letter", enforce: "planned:commit-msg-lint", enforceable: convention}
  - {id: commit-ref-format,       rule: "References to a prior commit include both the SHA and its summary line", enforce: "planned:commit-msg-lint", enforceable: convention}
  # --- patch / PR structure ---
  - {id: commit-atomicity,        rule: "Split changes into small, self-contained, individually-reviewable commits/PRs", enforce: "human", enforceable: convention}
  - {id: patch-atomicity-logical, rule: "Each logical change is separate (split bug fixes from optimizations, API changes from features)", enforce: "human", enforceable: convention}
  - {id: patch-cohesion,          rule: "A single logical change spanning many files stays in one commit/PR, not split", enforce: "human", enforceable: convention}
  - {id: patch-independence,      rule: "Each commit/PR is independently justifiable and verifiable on its own merits", enforce: "human", enforceable: convention}
  - {id: patch-dependency-note,   rule: "When a change depends on another, state the dependency in the description", enforce: "human", enforceable: convention}
  - {id: pr-series-size,          rule: "Keep a PR small enough to review in one sitting", enforce: "human", enforceable: convention}
  - {id: history-curation,        rule: "Present a clean final history; no intermediate trial-and-error commits in submissions", enforce: "human", enforceable: convention}
  - {id: no-wip-submission,       rule: "Do not submit unfinished/WIP changes intending to fix them later", enforce: "human", enforceable: convention}
  - {id: commit-bisectability,    rule: "Every commit builds and runs so history stays bisectable", enforce: "planned:per-commit-build", enforceable: convention}
  - {id: pure-move-change,        rule: "A change that relocates code does not also modify it; behavior changes go separately", enforce: "planned:pure-move-diff", enforceable: convention}
  # --- review / communication ---
  - {id: review-comment-response, rule: "Every reviewer comment is addressed or explicitly answered; none silently ignored", enforce: "human", enforceable: convention}
  - {id: review-no-change-rationale, rule: "A review comment producing no change is answered with the reason why", enforce: "human", enforceable: convention}
  - {id: revision-changelog,      rule: "Each new revision notes what changed from the prior one and re-notifies reviewers", enforce: "human", enforceable: convention}
  # --- security / docs / tooling ---
  - {id: security-disclosure-process, rule: "Security-sensitive fixes go through responsible disclosure, not public channels", enforce: "human", enforceable: convention}
  - {id: build-warnings-clean,    rule: "Code produces zero linter/type warnings; fix the warning rather than ignore it", enforce: "ruff + mypy-strict", enforceable: invariant}
  - {id: pre-submit-validation,   rule: "Non-trivial changes are built and exercised end-to-end before submission", enforce: "human", enforceable: convention}
  - {id: feature-docs,            rule: "Every new feature ships user-facing documentation on how to use it", enforce: "human", enforceable: convention}
  - {id: interface-doc-sync,      rule: "Changes to user-facing interfaces update the corresponding docs", enforce: "human", enforceable: convention}
  # --- AI-assisted contribution policy ---
  - {id: ai-contribution-process, rule: "AI-assisted contributions follow the same process, style, and review as human ones", enforce: "human", enforceable: convention}
  - {id: ai-code-human-review,    rule: "A human reviews all AI-generated code before submission", enforce: "human", enforceable: convention}
  - {id: contribution-accountability, rule: "A named human takes full responsibility for each contribution regardless of tooling", enforce: "human", enforceable: convention}
