<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kaixn — document</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --line:#30363d; --fg:#e6edf3;
          --muted:#8b949e; --accent:#58a6ff; --good:#3fb950; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  header { padding:16px 28px; border-bottom:1px solid var(--line); display:flex;
           align-items:center; gap:14px; }
  header a { color:var(--accent); text-decoration:none; font-size:14px; }
  .kind { font-size:12px; text-transform:uppercase; letter-spacing:.08em;
          padding:3px 9px; border:1px solid var(--line); border-radius:999px; color:var(--muted); }
  .wrap { max-width:820px; margin:0 auto; padding:30px 28px 90px; }
  .spin { display:flex; align-items:center; gap:12px; color:var(--muted); padding:40px 0; }
  .dot { width:15px; height:15px; border:2px solid var(--line); border-top-color:var(--accent);
         border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .err { color:#f85149; background:#23090b; border:1px solid #5c1a1d; padding:14px; border-radius:8px; }
  .doc h1 { font-size:30px; letter-spacing:-.02em; margin:0 0 6px; }
  .doc h2 { font-size:20px; margin:30px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--line); }
  .doc h3 { font-size:16px; margin:20px 0 8px; }
  .doc p, .doc li { color:#c9d1d9; }
  .doc code { background:#161b22; border:1px solid var(--line); border-radius:5px;
              padding:1px 5px; font-size:13px; font-family:ui-monospace,monospace; }
  .doc pre { background:#161b22; border:1px solid var(--line); border-radius:8px;
             padding:14px; overflow:auto; }
  .doc pre code { border:0; padding:0; }
  .doc table { border-collapse:collapse; margin:12px 0; width:100%; }
  .doc th, .doc td { border:1px solid var(--line); padding:7px 10px; text-align:left; }
  .doc th { background:#161b22; }
  .doc blockquote { border-left:3px solid var(--line); margin:12px 0; padding:2px 14px; color:var(--muted); }
  .relies { margin-top:26px; padding-top:16px; border-top:1px solid var(--line);
            font-size:13px; color:var(--muted); }
  .plink { display:inline-block; margin-left:6px; padding:2px 8px; border-radius:999px;
           border:1px solid #1f6feb; color:var(--accent); font-family:ui-monospace,monospace; }
  .mermaid { background:var(--panel); border:1px solid var(--line); border-radius:10px;
             padding:16px; margin:14px 0; text-align:center; }
</style>
</head>
<body>
<header>
  <a id="back" href="/">← playbook</a>
  <span class="kind" id="kind"></span>
  <span id="repo" style="color:var(--muted);font-size:13px;"></span>
</header>
<div class="wrap"><div id="out"><div class="spin"><div class="dot"></div><span>loading…</span></div></div></div>

<script>
const $ = id => document.getElementById(id);
const q = new URLSearchParams(location.search);
const repo = q.get('repo')||'', kind = q.get('kind')||'prd', slug = q.get('slug')||'';
marked.setOptions({ gfm:true });
mermaid.initialize({ startOnLoad:false, theme:'dark', securityLevel:'loose' });

$('kind').textContent = kind === 'spec' ? 'Tech Spec' : 'PRD';
$('repo').textContent = repo.replace(/^https?:\/\/github\.com\//,'');
$('back').href = '/?repo=' + encodeURIComponent(repo);

let tries = 0;
async function load() {
  try {
    const r = await fetch(`/api/doc?repo=${encodeURIComponent(repo)}&kind=${encodeURIComponent(kind)}&slug=${encodeURIComponent(slug)}`);
    if (r.status === 404) {                       // still generating — poll
      if (tries++ > 90) throw new Error('document not found (generation may have failed)');
      $('out').innerHTML = `<div class="spin"><div class="dot"></div><span>generating this document…</span></div>`;
      return setTimeout(load, 2000);
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    render(await r.json());
  } catch (e) {
    $('out').innerHTML = `<div class="err">${(e.message||e)}</div>`;
  }
}

function render(d) {
  let html = `<div class="doc">${marked.parse(d.markdown || '')}</div>`;
  if (d.principles && d.principles.length) {
    const pills = d.principles.map(a => `<span class="plink">${a}</span>`).join('');
    html += `<div class="relies">Engineering principles this relies on: ${pills}</div>`;
  }
  $('out').innerHTML = html;
  document.title = `kaixn — ${d.title || slug}`;
  // turn ```mermaid fenced blocks into rendered diagrams
  document.querySelectorAll('pre code.language-mermaid').forEach((el, i) => {
    const holder = document.createElement('div');
    holder.className = 'mermaid'; holder.textContent = el.textContent;
    el.closest('pre').replaceWith(holder);
  });
  try { mermaid.run({ querySelector: '.mermaid' }); } catch (e) {}
}
load();
</script>
</body>
</html>
