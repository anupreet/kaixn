<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kaixn</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
<link rel="icon" href="/static/enso.svg">
<link rel="apple-touch-icon" href="/static/enso.svg">
<style>
  :root { --bg:#0d1117; --panel:#161b22; --line:#30363d; --fg:#e6edf3;
          --muted:#8b949e; --accent:#58a6ff; --good:#3fb950; --warn:#d29922;
          /* kaixn brand (from kaixn.com) — warm clay accent */
          --clay:#c2764d; --clay-2:#a9633f; --clay-soft:#e7d6c7; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
         background:var(--bg); color:var(--fg); }
  header { padding:16px 28px; border-bottom:1px solid var(--line); }
  .brand { display:inline-flex; align-items:center; gap:11px; cursor:pointer; }
  .brand img { width:34px; height:34px; display:block;
               filter:invert(1) sepia(1) saturate(3) hue-rotate(330deg) brightness(.95); }
  .brand .wm { font-family:"Fraunces",Georgia,serif; font-weight:600; font-size:24px;
               letter-spacing:-.01em; color:var(--fg); }
  .brand small { color:var(--muted); font-weight:400; font-size:13px;
                 font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  .wrap { max-width:1040px; margin:0 auto; padding:24px 28px 80px; transition:max-width .2s; }
  .wrap.wide { max-width:1380px; }
  .bar { display:flex; gap:10px; margin-bottom:6px; }
  input { flex:1; background:var(--panel); border:1px solid var(--line); color:var(--fg);
          padding:11px 13px; border-radius:8px; font-size:15px; }
  input:focus { outline:none; border-color:var(--clay); }
  button { background:linear-gradient(135deg,var(--clay),var(--clay-2)); color:#fff7f0; border:0;
           padding:11px 18px; border-radius:8px; font-weight:600; cursor:pointer;
           box-shadow:0 1px 0 rgba(255,255,255,.08) inset, 0 2px 8px rgba(169,99,63,.35); }
  button:hover { filter:brightness(1.08); }
  button:disabled { opacity:.55; cursor:default; filter:none; }
  .hint { color:var(--muted); font-size:13px; margin:2px 0 22px; }
  .section-label { font-size:12px; text-transform:uppercase; letter-spacing:.08em;
                   color:var(--muted); margin:30px 0 12px; }
  .spin { display:flex; align-items:center; gap:12px; color:var(--muted); padding:30px 0; }
  .dot { width:14px; height:14px; border:2px solid var(--line); border-top-color:var(--accent);
         border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .err { color:#f85149; background:#23090b; border:1px solid #5c1a1d; padding:12px 14px; border-radius:8px; }
  .mini { background:transparent; color:var(--muted); border:1px solid var(--line);
          padding:5px 11px; border-radius:7px; font-size:12px; font-weight:500; cursor:pointer;
          text-decoration:none; display:inline-block; }
  .mini:hover { color:var(--accent); border-color:var(--accent); }
  .mini.danger:hover { color:#f85149; border-color:#f85149; }
  .badge { font-size:12px; padding:3px 9px; border-radius:999px; border:1px solid var(--line);
           color:var(--muted); }
  .badge.llm { border-color:#1f6feb; color:var(--accent); }
  .tabs { display:flex; gap:4px; border-bottom:1px solid var(--line); margin-bottom:20px; flex-wrap:wrap; }
  .tab { padding:10px 16px; cursor:pointer; color:var(--muted); border-bottom:2px solid transparent;
         font-weight:500; }
  .tab.active { color:var(--fg); border-bottom-color:var(--accent); }
  .tab .ct { font-size:12px; color:var(--muted); margin-left:6px; }
  .pane { display:none; } .pane.active { display:block; }

  /* doc list (features / specs) — human, not technical */
  .doc-row { display:flex; align-items:center; gap:12px; background:var(--panel);
             border:1px solid var(--line); border-radius:10px; padding:14px 16px;
             margin-bottom:10px; text-decoration:none; color:var(--fg); transition:border-color .15s; }
  .doc-row:hover { border-color:var(--accent); }
  .doc-row .body { flex:1; min-width:0; }
  .doc-row .t { font-weight:600; }
  .doc-row .s { color:var(--muted); margin-top:3px; font-size:14px; }
  .doc-row .st { font-size:12px; flex:none; }
  .doc-row .st.ready { color:var(--good); }
  .doc-row .st.gen { color:var(--muted); }
  .doc-row .arrow { color:var(--muted); flex:none; }
  .reliesline { margin-top:7px; }
  .plink { display:inline-block; margin-right:6px; padding:1px 7px; border-radius:999px;
           border:1px solid #1f6feb; color:var(--accent); font-size:11px; font-family:ui-monospace,monospace; }

  /* explore list */
  .repo-row { display:flex; align-items:center; gap:12px; background:var(--panel);
              border:1px solid var(--line); border-radius:10px; padding:13px 16px;
              margin-bottom:10px; cursor:pointer; }
  .repo-row:hover { border-color:var(--accent); }
  .repo-row .nm { font-weight:600; flex:1; }
  .repo-row .meta { color:var(--muted); font-size:12px; }
  .genbadge { color:var(--accent); }

  /* principles cards */
  .group { font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted);
           margin:22px 0 10px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:10px;
          padding:14px 16px; margin-bottom:12px; }
  .card .s { color:var(--muted); margin-top:3px; }
  .ptop { display:flex; justify-content:space-between; gap:12px; align-items:baseline; }
  .val { color:var(--accent); font-weight:600; }
  .pills { display:flex; gap:6px; align-items:center; flex-shrink:0; }
  .pill { font-size:11px; padding:2px 8px; border-radius:999px; border:1px solid var(--line); color:var(--muted); }
  .pill.gov { border-color:#9e6a03; color:var(--warn); }
  .pill.adv { border-color:#238636; color:var(--good); }
  .pill.llm { border-color:#1f6feb; color:var(--accent); }
  .sup { font-family:ui-monospace,monospace; font-size:12px; color:var(--muted); }
  .conv { color:var(--good); } .nconv { color:var(--muted); }
  .ev { color:var(--muted); font-size:12px; margin-top:8px; font-family:ui-monospace,monospace; }
  .counter { color:var(--warn); font-size:12px; margin-top:6px; font-family:ui-monospace,monospace; }
  .empty { color:var(--muted); padding:18px 0; }

  /* domain graph */
  .mermaid { background:var(--panel); border:1px solid var(--line); border-radius:10px;
             padding:16px; margin:6px 0 18px; text-align:center; overflow:auto; }
  .entlist { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; }
  .ent { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:10px 12px; }
  .ent .en { font-weight:600; } .ent .ed { color:var(--muted); font-size:12px; margin-top:2px; }

  .prog { display:flex; align-items:center; gap:10px; color:var(--muted); font-size:13px;
          margin:2px 0 16px; min-height:18px; }
  .prog.err { color:#f85149; }
  .prog .dot { width:13px; height:13px; border:2px solid var(--line); border-top-color:var(--accent);
               border-radius:50%; display:inline-block; animation:spin .8s linear infinite; flex:none; }
  .prog .tick { color:var(--good); font-weight:700; }

  /* breadcrumb */
  .crumbs { display:flex; align-items:center; gap:8px; margin:2px 0 14px; font-size:14px; }
  .crumbs a { color:var(--accent); text-decoration:none; cursor:pointer; }
  .crumbs a:hover { text-decoration:underline; }
  .crumbs .sep { color:var(--muted); }
  .crumbs .cur { font-weight:600; }
  .crumbs .grow { flex:1; }

  /* split view: ¼ list (master) + ¾ detail */
  .split { display:flex; gap:18px; align-items:flex-start; }
  .split .dlist { flex:0 0 26%; min-width:210px; position:sticky; top:16px;
                  max-height:calc(100vh - 32px); overflow:auto; }
  .split .ddetail { flex:1; min-width:0; background:var(--panel); border:1px solid var(--line);
                    border-radius:12px; display:flex; flex-direction:column; }
  .detail-head { display:flex; align-items:center; gap:12px; padding:13px 20px;
                 border-bottom:1px solid var(--line); }
  .detail-head .crumb { color:var(--muted); font-size:13px; min-width:0; overflow:hidden;
                        text-overflow:ellipsis; white-space:nowrap; }
  .detail-head .crumb b { color:var(--fg); }
  .detail-head .grow { flex:1; }
  .detail-body { padding:24px 28px 40px; overflow:auto; }
  /* compact rows inside the master list */
  .split .doc-row { padding:10px 13px; margin-bottom:8px; }
  .split .doc-row .s, .split .doc-row .reliesline, .split .doc-row .arrow { display:none; }
  .split .doc-row.active { border-color:var(--clay); background:#1c232e; }
  .split .doc-row.active .t { color:var(--clay); }

  /* nested tree: overview (pinned) → group header → indented children */
  .doc-row.ovrow { border-color:#3a3326; background:#17150f; }
  .doc-row.ovrow .t::before { content:"◆ "; color:var(--clay); }
  .doc-row.child { margin-left:18px; }
  .split .doc-row.child { margin-left:12px; }
  .grp-head { display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none;
              padding:12px 6px 6px; color:var(--muted); font-size:11px;
              text-transform:uppercase; letter-spacing:.07em; }
  .grp-head:hover { color:var(--fg); }
  .grp-head .caret { font-size:9px; transition:transform .15s; }
  .grp-head.collapsed .caret { transform:rotate(-90deg); }
  .grp-head .gname { font-weight:700; }
  .grp-head .gcount { color:var(--muted); font-weight:400; }
  @media (max-width:820px){
    .split { flex-direction:column; }
    .split .dlist { position:static; flex-basis:auto; width:100%; max-height:none; }
  }

  /* rendered markdown (shared shape with doc.html) */
  .doc h1 { font-size:28px; letter-spacing:-.02em; margin:0 0 6px; }
  .doc h2 { font-size:19px; margin:28px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--line); }
  .doc h3 { font-size:15px; margin:18px 0 8px; }
  .doc p, .doc li { color:#c9d1d9; }
  .doc code { background:#161b22; border:1px solid var(--line); border-radius:5px;
              padding:1px 5px; font-size:13px; font-family:ui-monospace,monospace; }
  .doc pre { background:#161b22; border:1px solid var(--line); border-radius:8px; padding:14px; overflow:auto; }
  .doc pre code { border:0; padding:0; }
  .doc table { border-collapse:collapse; margin:12px 0; width:100%; }
  .doc th, .doc td { border:1px solid var(--line); padding:7px 10px; text-align:left; }
  .doc th { background:#161b22; }
  .doc blockquote { border-left:3px solid var(--line); margin:12px 0; padding:2px 14px; color:var(--muted); }
  .relies { margin-top:26px; padding-top:16px; border-top:1px solid var(--line); font-size:13px; color:var(--muted); }

  /* PM copilot chat */
  .chat-launch { position:fixed; bottom:22px; right:24px; z-index:60; display:none;
    align-items:center; gap:8px; border:0; border-radius:999px; padding:12px 18px;
    font-weight:600; cursor:pointer; color:#fff7f0;
    background:linear-gradient(135deg,var(--clay),var(--clay-2));
    box-shadow:0 6px 20px rgba(169,99,63,.45); }
  .chat-launch.show { display:inline-flex; }
  .chat-panel { position:fixed; bottom:22px; right:24px; z-index:61; width:min(440px,94vw);
    height:min(640px,84vh); background:var(--bg); border:1px solid var(--line);
    border-radius:14px; box-shadow:0 24px 60px rgba(0,0,0,.55); display:none;
    flex-direction:column; overflow:hidden; }
  .chat-panel.open { display:flex; }
  .chat-head { display:flex; align-items:center; gap:10px; padding:11px 14px; border-bottom:1px solid var(--line); }
  .chat-head .ttl { font-family:"Fraunces",Georgia,serif; font-weight:600; display:flex; align-items:center; gap:8px; }
  .chat-head .ttl img { width:20px; height:20px; filter:invert(1) sepia(1) saturate(3) hue-rotate(330deg) brightness(.95); }
  .chat-head .chat-user { margin-left:auto; color:var(--muted); font-size:12px; font-family:ui-monospace,monospace; }
  .chat-head select { background:var(--panel); color:var(--fg); border:1px solid var(--line); border-radius:7px; padding:4px 6px; font-size:12px; }
  .gh-btn { display:inline-flex; align-items:center; gap:8px; margin-top:14px; padding:10px 16px;
    border-radius:8px; background:#24292f; color:#fff; text-decoration:none; font-weight:600; border:1px solid #444c56; }
  .gh-btn:hover { background:#2d333b; }
  .chat-head .x { cursor:pointer; color:var(--muted); border:1px solid var(--line); border-radius:7px; padding:3px 9px; }
  .chat-head .x:hover { color:var(--accent); border-color:var(--accent); }
  .chat-msgs { flex:1; overflow:auto; padding:14px; display:flex; flex-direction:column; gap:11px; }
  .msg { max-width:90%; padding:9px 12px; border-radius:12px; font-size:14px; line-height:1.5; }
  .msg.user { align-self:flex-end; background:#1c232e; border:1px solid var(--line); white-space:pre-wrap; }
  .msg.bot { align-self:flex-start; background:var(--panel); border:1px solid var(--line); }
  .msg.bot .md > :first-child { margin-top:0; } .msg.bot .md > :last-child { margin-bottom:0; }
  .msg.bot .md p { margin:.4em 0; } .msg.bot .md ul { margin:.4em 0; padding-left:18px; }
  .msg.bot .md code { background:#0d1117; border:1px solid var(--line); border-radius:4px; padding:0 4px; font-size:12px; }
  .chat-step { align-self:flex-start; color:var(--muted); font-size:12px; display:flex; align-items:center; gap:8px; }
  .chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:9px; }
  .chip { font-size:11px; padding:2px 8px; border-radius:999px; border:1px solid var(--line); color:var(--muted); }
  .chip.conflict { border-color:#f85149; color:#f85149; }
  .chip.tension { border-color:var(--warn); color:var(--warn); }
  .chip.gap { border-color:var(--accent); color:var(--accent); }
  .chip.consistent { border-color:var(--good); color:var(--good); }
  .chat-compose { display:flex; gap:8px; padding:12px; border-top:1px solid var(--line); }
  .chat-compose textarea { flex:1; resize:none; height:42px; max-height:120px; background:var(--panel);
    color:var(--fg); border:1px solid var(--line); border-radius:8px; padding:10px 11px; font:inherit; font-size:14px; }
  .chat-empty { color:var(--muted); font-size:13px; text-align:center; margin:auto; padding:20px; line-height:1.5; }
</style>
</head>
<body>
<header>
  <span class="brand" onclick="go_home()">
    <img src="/static/enso.svg" alt="kaixn ensō mark">
    <span class="wm">kaixn</span>
    <small>· product + engineering knowledge, mined from code</small>
  </span>
</header>
<div class="wrap" id="wrap"><div id="out"></div></div>

<button class="chat-launch" id="chatLaunch" onclick="openChat()">💬 Discuss a feature</button>
<aside class="chat-panel" id="chatPanel" aria-hidden="true">
  <div class="chat-head">
    <span class="ttl"><img src="/static/enso.svg" alt="">copilot</span>
    <span class="chat-user" id="chatUser"></span>
    <select id="chatPersona" title="Who you are">
      <option value="generalist_pm">Product Manager</option>
      <option value="growth_pm">Growth PM</option>
      <option value="platform_pm">Platform PM</option>
    </select>
    <span class="x" onclick="closeChat()" title="Close">✕</span>
  </div>
  <div class="chat-msgs" id="chatMsgs"></div>
  <div class="chat-compose" id="chatCompose">
    <textarea id="chatInput" placeholder="Describe a feature you're considering…" onkeydown="chatKey(event)"></textarea>
    <button onclick="sendChat()">Send</button>
  </div>
</aside>

<script>
const $ = id => document.getElementById(id);
const esc = s => (s??"").toString().replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const shortRepo = r => (r||'').replace(/^https?:\/\/github\.com\//,'');
const docUrl = (repo,kind,slug) => `/doc?repo=${encodeURIComponent(repo)}&kind=${kind}&slug=${encodeURIComponent(slug)}`;
mermaid.initialize({ startOnLoad:false, theme:'dark', securityLevel:'loose' });

let S = null;  // live playbook state

function go_home(){ _streamGen++; hideDoc(); history.pushState({}, '', '/'); landing(); }
window.addEventListener('popstate', route);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDoc(); });
function route(){
  const p = new URLSearchParams(location.search);
  const repo = p.get('repo'), kind = p.get('kind'), slug = p.get('slug');
  if (!repo) { hideDoc(); return landing(); }
  // already on this repo → just sync the split to the URL (no reload, no flicker)
  if (S && S.repo === repo && $('out').querySelector('.tabs')) {
    if (kind && slug) openDoc(kind, slug, false);
    else if (S.open) { S.open = null; renderShell(); }   // back/forward → collapse split
  } else {
    viewRepo(repo);   // loads the repo, then opens the doc from the URL if present
  }
}
// open the doc named in the URL, if any (called after a repo's shell renders)
function syncDocFromUrl(){
  const p = new URLSearchParams(location.search), kind = p.get('kind'), slug = p.get('slug');
  if (kind && slug) openDoc(kind, slug, false); else hideDoc();
}

// ---------- Landing: Add or Explore ----------
async function landing() {
  S = null;
  const w = $('wrap'); if (w) w.classList.remove('wide');
  closeChat(); chatLauncher(false);          // copilot is per-repo; hide on the landing
  $('out').innerHTML = `
    <div class="section-label">Add a repo</div>
    <div class="bar">
      <input id="repo" placeholder="Paste a public GitHub repo URL — e.g. https://github.com/owner/name">
      <button id="go" onclick="run()">Generate</button>
    </div>
    <div class="hint">Clones the repo and generates its full playbook: PRDs, tech specs,
      a domain model, and the engineering principles it actually follows — then stores it.</div>
    <div class="section-label">Explore indexed repos</div>
    <div id="repolist"><div class="spin"><div class="dot"></div><span>loading…</span></div></div>`;
  $('repo').addEventListener('keydown', e => { if (e.key === 'Enter') run(); });
  try {
    const [d, jr] = await Promise.all([
      fetch('/api/repos').then(r => r.json()),
      fetch('/api/playbook/jobs').then(r => r.json()).catch(() => ({running: []})),
    ]);
    const running = new Set(jr.running || []);
    const repos = d.repos || [];
    // include any running repo not yet in the persisted list
    running.forEach(r => { if (!repos.some(x => x.repo === r)) repos.unshift({repo: r, n_docs: 0, running: true}); });
    $('repolist').innerHTML = repos.length ? repos.map(x => {
      const gen = running.has(x.repo);
      return `<div class="repo-row" onclick="viewRepo('${encodeURIComponent(x.repo)}')">
        <span class="nm">${esc(shortRepo(x.repo))}</span>
        <span class="meta">${gen ? '<span class="genbadge">● generating…</span>' : (x.n_docs + ' docs' + (x.llm===false?' · offline':''))}</span>
        <button class="mini" title="Regenerate from latest code"
                onclick="event.stopPropagation(); run('${esc(x.repo)}')">↻ refresh</button>
        <button class="mini danger" title="Remove from index"
                onclick="event.stopPropagation(); removeRepo('${esc(x.repo)}')">✕</button>
        <span class="arrow">→</span>
      </div>`; }).join('') : `<div class="empty">No repos indexed yet — add one above.</div>`;
  } catch (e) { $('repolist').innerHTML = `<div class="empty">Could not load indexed repos.</div>`; }
}

// Remove a repo's playbook from the index (deletes its stored docs).
async function removeRepo(repo) {
  if (!confirm(`Remove ${shortRepo(repo)} from the index? This deletes its generated docs.`)) return;
  try { await fetch('/api/playbook?repo=' + encodeURIComponent(repo), { method: 'DELETE' }); }
  catch (e) {}
  landing();
}

// ---------- View an already-indexed repo (no regeneration) ----------
async function viewRepo(repoEnc) {
  const repo = decodeURIComponent(repoEnc);
  // preserve a deep-linked doc (?kind&slug) so syncDocFromUrl can open the split;
  // a bare repo nav (from the explore list) has none and just lands on the lists.
  const cur = new URLSearchParams(location.search);
  const k = cur.get('kind'), sl = cur.get('slug');
  const suffix = (k && sl) ? `&kind=${k}&slug=${encodeURIComponent(sl)}` : '';
  history.pushState({}, '', '/?repo=' + encodeURIComponent(repo) + suffix);
  $('out').innerHTML = `<div class="spin"><div class="dot"></div><span>loading ${esc(shortRepo(repo))}…</span></div>`;
  // if a generation job is currently running for this repo, attach to it live
  try {
    const jr = await (await fetch('/api/playbook/jobs')).json();
    if ((jr.running || []).includes(repo)) { S = null; return openStream(repo); }
  } catch (e) {}
  try {
    const r = await fetch('/api/playbook?repo=' + encodeURIComponent(repo));
    if (r.status === 404) return run(repo);          // not indexed → generate
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const pb = await r.json();
    S = { repo: pb.repo, llm: pb.llm, active: 'feat', ready: new Set(),
          domain: { mermaid: pb.mermaid, entities: pb.entities || [] },
          principles: pb.principles || [],
          features: (pb.docs||[]).filter(d => d.kind==='prd'),
          tech_specs: (pb.docs||[]).filter(d => d.kind==='spec') };
    (pb.docs||[]).forEach(d => S.ready.add(d.kind + ':' + d.slug));
    renderShell();
    setProg(`indexed · ${(pb.docs||[]).length} documents`, false);
    syncDocFromUrl();                                // deep-link: open the doc in the URL
  } catch (e) { $('out').innerHTML = `<div class="err">${esc(e.message||e)}</div>`; }
}

// ---------- Generate: start a server-side JOB, then subscribe ----------
let _streamGen = 0;   // bumps to cancel a previous live stream

async function run(presetRepo) {
  const url = (presetRepo || ($('repo') && $('repo').value) || '').trim();
  if (!url) return;
  S = { repo: url, llm: null, features: [], tech_specs: [], principles: [],
        domain: null, ready: new Set(), active: 'feat' };
  renderShell();
  setProg('starting generation…', true);
  try {
    const g = await fetch('/api/playbook/generate', { method:'POST',
      headers:{'Content-Type':'application/json'}, body: JSON.stringify({ repo_url: url }) });
    const gd = await g.json();
    if (!g.ok) throw new Error(gd.detail || ('HTTP '+g.status));
    S.repo = gd.repo || url;
    history.replaceState({}, '', '/?repo=' + encodeURIComponent(S.repo));
    openStream(S.repo);
  } catch (e) { setProg(`error: ${e.message}`, false, true); }
}

// Subscribe to a job's event stream. The job runs server-side regardless of this
// connection, so on a dropped stream we simply reconnect and replay — the server
// resends the full log and we rebuild state from scratch.
async function openStream(repo) {
  const gen = ++_streamGen;
  let done = false;
  while (!done && gen === _streamGen) {
    const active = S ? S.active : 'feat', llm = S ? S.llm : null;
    S = { repo, llm, features: [], tech_specs: [], principles: [],
          domain: null, ready: new Set(), active };
    renderShell();
    try {
      const r = await fetch('/api/playbook/events?repo=' + encodeURIComponent(repo));
      if (r.status === 404) { setProg('no active generation for this repo', false, true); return; }
      if (!r.ok || !r.body) throw new Error('HTTP ' + r.status);
      const reader = r.body.getReader(), dec = new TextDecoder();
      let buf = '';
      for (;;) {
        const { value, done: d } = await reader.read();
        if (d) break;
        if (gen !== _streamGen) { try { reader.cancel(); } catch(e){} return; }
        buf += dec.decode(value, { stream: true });
        let idx;
        while ((idx = buf.indexOf('\n\n')) >= 0) {
          const frame = buf.slice(0, idx); buf = buf.slice(idx + 2);
          const line = frame.split('\n').find(l => l.startsWith('data:'));   // ignores ': keepalive'
          if (line) { const ev = JSON.parse(line.slice(5).trim()); onEvent(ev);
                      if (ev.event === 'done' || ev.event === 'error') done = true; }
        }
      }
    } catch (e) { /* dropped — fall through to reconnect */ }
    if (done || gen !== _streamGen) return;
    setProg('reconnecting…', true);
    await new Promise(res => setTimeout(res, 2000));
  }
}

function onEvent(ev) {
  switch (ev.event) {
    case 'meta':
      S.llm = ev.llm; S.repo = ev.repo || S.repo;
      history.replaceState({}, '', '/?repo=' + encodeURIComponent(S.repo));
      renderShell(); break;
    case 'status':      setProg(ev.step, true); break;
    case 'conventions': S.principles = (ev.items||[]).concat(S.principles); refresh('prin'); break;
    case 'principle':   S.principles.push(ev.item); refresh('prin');
                        setProg(`verified design axis: ${ev.item.axis} (${ev.item.support})`, true); break;
    case 'domain':      S.domain = ev.domain; refresh('dom'); break;
    case 'features':    S.features = ev.items||[]; refresh('feat'); break;
    case 'tech_specs':  S.tech_specs = ev.items||[]; refresh('tech'); break;
    case 'doc':         S.ready.add(ev.kind + ':' + ev.slug);
                        refresh(ev.kind==='prd' ? 'feat' : 'tech');
                        setProg(`generated: ${ev.title}`, true); break;
    case 'doc_error':   setProg(`doc failed: ${ev.title}`, true); break;
    case 'done':        setProg('complete — all documents stored', false); break;
    case 'error':       setProg(`error: ${ev.detail||('HTTP '+ev.status)}`, false, true); break;
  }
}

function setProg(text, busy, err) {
  const p = $('prog'); if (!p) return;
  p.className = err ? 'prog err' : 'prog';
  p.innerHTML = (busy ? `<span class="dot"></span>` : (err ? '' : `<span class="tick">✓</span>`)) +
                `<span>${esc(text)}</span>`;
}

// ---------- Render ----------
function docTitleOf(open) {
  const list = open.kind === 'prd' ? S.features : S.tech_specs;
  const it = (list || []).find(x => x.slug === open.slug) || {};
  return it.title || it.name || it.area || open.slug;
}
function renderShell() {
  const f = S.features, t = S.tech_specs, p = S.principles;
  const llmBadge = S.llm == null ? '' : (S.llm ? `<span class="badge llm">LLM</span>`
                                                : `<span class="badge">offline</span>`);
  const repoShort = esc(shortRepo(S.repo) || 'repo');
  const crumbPath = S.open
    ? `<a onclick="go_home();return false" href="/">kaixn</a><span class="sep">/</span>
       <a onclick="closeDoc();return false" href="#">${repoShort}</a>
       <span class="sep">/</span><span class="cur">${esc(docTitleOf(S.open))}</span>`
    : `<a onclick="go_home();return false" href="/">kaixn</a><span class="sep">/</span>
       <span class="cur">${repoShort}</span>`;
  const w = $('wrap'); if (w) w.classList.toggle('wide', !!S.open);
  chatLauncher(true);                          // copilot available while viewing a repo
  $('out').innerHTML = `
    <div class="crumbs">
      ${crumbPath}
      ${llmBadge}
      <span class="grow"></span>
      <button class="mini" title="Regenerate from latest code" onclick="run('${esc(S.repo)}')">↻ regenerate</button>
    </div>
    <div id="prog" class="prog"></div>
    <div class="tabs">
      ${tabBtn('feat','PRDs', f.length)}
      ${tabBtn('tech','Tech Specs', t.length)}
      ${tabBtn('dom','Domain Model', '')}
      ${tabBtn('prin','Engineering Principles', p.length)}
    </div>
    <div id="feat" class="pane ${cls('feat')}">${renderDocsPane(f,'prd')}</div>
    <div id="tech" class="pane ${cls('tech')}">${renderDocsPane(t,'spec')}</div>
    <div id="dom"  class="pane ${cls('dom')}">${renderDomain()}</div>
    <div id="prin" class="pane ${cls('prin')}">${renderPrinciples(p)}</div>`;
  if (S.active === 'dom') runMermaid();
}
const cls = n => S.active===n ? 'active' : '';
const tabBtn = (n,label,ct) => `<div class="tab ${cls(n)}" data-t="${n}" onclick="tab('${n}')">${label}${ct!==''?`<span class="ct" id="c-${n}">${ct}</span>`:''}</div>`;

function refresh(pane) {
  if (pane==='dom') { const el=$('dom'); if (el){ el.innerHTML = renderDomain(); if (S.active==='dom') runMermaid(); } return; }
  if (pane==='feat' || pane==='tech') {
    const kind = pane==='feat' ? 'prd' : 'spec';
    const data = pane==='feat' ? S.features : S.tech_specs;
    const el = $(pane); if (el) el.innerHTML = renderDocsPane(data, kind);
    const ct = $('c-'+pane); if (ct) ct.textContent = data.length;
    if (S.open && S.open.kind===kind) loadDetail();   // re-fill detail if the split was rebuilt
    return;
  }
  const el = $('prin'); if (el) el.innerHTML = renderPrinciples(S.principles);
  const ct = $('c-prin'); if (ct) ct.textContent = S.principles.length;
}

function tab(name) {
  if (!S) return;
  if (S.open && S.active !== name) {        // leaving an open doc → collapse the split
    S.open = null;
    history.replaceState({}, '', '/?repo=' + encodeURIComponent(S.repo));
    S.active = name; renderShell(); return;
  }
  S.active = name;
  document.querySelectorAll('.tab').forEach(e => e.classList.toggle('active', e.dataset.t===name));
  document.querySelectorAll('.pane').forEach(e => e.classList.toggle('active', e.id===name));
  if (name==='dom') runMermaid();
}

function principleLinks(ps) {
  if (!ps || !ps.length) return '';
  return `<div class="reliesline">` + ps.map(a => `<span class="plink">${esc(a)}</span>`).join('') + `</div>`;
}

// the split master pane: ¼ list + ¾ detail; falls back to a plain full list
function renderDocsPane(items, kind) {
  if (!(S.open && S.open.kind === kind)) return renderDocs(items, kind);
  return `<div class="split">
    <div class="dlist">${renderDocs(items, kind)}</div>
    <div class="ddetail">
      <div class="detail-head">
        <span class="kind">${kind==='spec'?'Tech Spec':'PRD'}</span>
        <span class="grow"></span>
        <a class="mini" id="dfull" target="_blank" rel="noopener" title="Open as a full, shareable page">↗ full page</a>
        <button class="mini" onclick="closeDoc()" title="Close (Esc)">✕ close</button>
      </div>
      <div class="detail-body" id="dbody"><div class="spin"><div class="dot"></div><span>loading…</span></div></div>
    </div>
  </div>`;
}

function docRow(x, kind, child) {
  const title = x.title || x.name || x.area || 'untitled';
  const ready = S.ready.has(kind + ':' + x.slug);
  const st = ready ? `<span class="st ready">✓ ready</span>` : `<span class="st gen">⏳ generating…</span>`;
  const active = (S.open && S.open.kind===kind && S.open.slug===x.slug) ? ' active' : '';
  const ov = x.slug === 'overview' ? ' ovrow' : '';
  return `<a class="doc-row${active}${child?' child':''}${ov}" href="${docUrl(S.repo, kind, x.slug)}"
      onclick="if(event.metaKey||event.ctrlKey||event.shiftKey)return true; openDoc('${kind}','${esc(x.slug)}'); return false;">
    <div class="body">
      <div class="t">${esc(title)}</div>
      ${x.summary ? `<div class="s">${esc(x.summary)}</div>`:''}
      ${principleLinks(x.principles)}
    </div>${st}<span class="arrow">→</span></a>`;
}

// nested tree: Overview (pinned) → ungrouped items → collapsible group → items
function renderDocs(items, kind) {
  if (!items.length) return `<div class="empty">${S.llm===null?'generating…':'none surfaced.'}</div>`;
  const ov = items.find(x => x.slug === 'overview');
  const rest = items.filter(x => x.slug !== 'overview');
  let html = ov ? docRow(ov, kind) : '';
  html += rest.filter(x => !(x.grp || '').trim()).map(x => docRow(x, kind)).join('');
  const order = [], by = {};
  rest.forEach(x => { const g = (x.grp || '').trim();
    if (g) { if (!by[g]) { by[g] = []; order.push(g); } by[g].push(x); } });
  order.forEach(g => {
    const collapsed = COLLAPSED.has(kind + ':' + g);
    html += `<div class="grp-head${collapsed?' collapsed':''}" data-k="${kind}" data-g="${esc(g)}" onclick="toggleGroupEl(this)">
      <span class="caret">▾</span><span class="gname">${esc(g)}</span><span class="gcount">${by[g].length}</span></div>`;
    if (!collapsed) html += by[g].map(x => docRow(x, kind, true)).join('');
  });
  return html;
}
const COLLAPSED = new Set();   // collapsed group keys "kind:group" (session-scoped)
function toggleGroupEl(el) {
  const key = el.dataset.k + ':' + el.dataset.g;
  COLLAPSED.has(key) ? COLLAPSED.delete(key) : COLLAPSED.add(key);
  const pane = el.dataset.k === 'prd' ? 'feat' : 'tech';
  const list = document.querySelector('#' + pane + ' .dlist') || $(pane);
  if (list) list.innerHTML = renderDocs(el.dataset.k === 'prd' ? S.features : S.tech_specs, el.dataset.k);
}

// ---------- Split view — open a PRD/spec in the ¾ detail pane; the ¼ list stays for browsing ----------
function openDoc(kind, slug, push = true) {
  if (!S) return;
  if (push) history.pushState({ doc: 1 }, '',
      `/?repo=${encodeURIComponent(S.repo)}&kind=${kind}&slug=${encodeURIComponent(slug)}`);
  S.open = { kind, slug };
  S.active = kind === 'prd' ? 'feat' : 'tech';     // show the tab that holds it
  renderShell();                                   // active pane becomes a split
  loadDetail();
}
async function loadDetail() {
  if (!S || !S.open) return;
  const { kind, slug } = S.open;
  const full = $('dfull'); if (full) full.href = docUrl(S.repo, kind, slug);
  const body = $('dbody'); if (!body) return;
  body.innerHTML = `<div class="spin"><div class="dot"></div><span>loading…</span></div>`;
  try {
    const r = await fetch(`/api/doc?repo=${encodeURIComponent(S.repo)}&kind=${kind}&slug=${encodeURIComponent(slug)}`);
    if (r.status === 404) { body.innerHTML = `<div class="empty">⏳ This document is still generating — check back in a moment.</div>`; return; }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    renderDoc(await r.json(), body);
  } catch (e) { body.innerHTML = `<div class="err">${esc(e.message || e)}</div>`; }
}
function renderDoc(d, body) {
  let html = `<div class="doc">${marked.parse(d.markdown || '')}</div>`;
  if (d.principles && d.principles.length)
    html += `<div class="relies">Engineering principles this relies on: ` +
            d.principles.map(a => `<span class="plink">${esc(a)}</span>`).join('') + `</div>`;
  body.innerHTML = html; body.scrollTop = 0;
  body.querySelectorAll('pre code.language-mermaid').forEach(el => {
    const h = document.createElement('div'); h.className = 'mermaid'; h.textContent = el.textContent;
    el.closest('pre').replaceWith(h);
  });
  try { mermaid.run({ querySelector: '.detail-body .mermaid' }); } catch (e) {}
}
function closeDoc() {     // collapse the split back to the full list
  if (!S || !S.open) return;
  S.open = null;
  history.pushState({}, '', '/?repo=' + encodeURIComponent(S.repo));
  renderShell();
}
function hideDoc() { if (S) S.open = null; }   // clear state only; caller re-renders

function renderDomain() {
  if (!S.domain) return `<div class="empty">mapping the domain model…</div>`;
  const ents = (S.domain.entities||[]).map(e =>
    `<div class="ent"><div class="en">${esc(e.name)}</div><div class="ed">${esc(e.description||'')}</div></div>`).join('');
  return `<div class="mermaid" id="ddd">${esc(S.domain.mermaid||'')}</div>
    ${ents ? `<div class="section-label">Key objects</div><div class="entlist">${ents}</div>`:''}`;
}
function runMermaid() {
  const el = $('ddd'); if (!el || !S.domain) return;
  if (el.dataset.done) return;
  el.removeAttribute('data-processed');
  el.textContent = S.domain.mermaid || '';
  try { mermaid.run({ nodes: [el] }).then(()=>{ el.dataset.done='1'; })
        .catch(()=>{ el.innerHTML = `<pre style="text-align:left">${esc(S.domain.mermaid||'')}</pre>`; }); }
  catch(e) { el.innerHTML = `<pre style="text-align:left">${esc(S.domain.mermaid||'')}</pre>`; }
}

function renderPrinciples(p) {
  if (!p.length) return `<div class="empty">no principles mined.</div>`;
  const design = p.filter(x => x.method && x.method.startsWith('llm'));
  const conv = p.filter(x => !(x.method && x.method.startsWith('llm')));
  let h = '';
  if (design.length) h += `<div class="group">Design &amp; architecture</div>` + design.map(card).join('');
  if (conv.length) h += `<div class="group">Conventions (deterministic · exact support)</div>` + conv.map(card).join('');
  return h;
}
function card(x) {
  const tierCls = x.tier==='governed' ? 'gov' : 'adv';
  const conv = x.convention ? `<span class="conv">✅ convention</span>` : `<span class="nconv">— below threshold</span>`;
  const ev = (x.evidence||[]).slice(0,4).map(e=>esc(e)).join(' · ');
  const ce = (x.counterexamples||[]).slice(0,3).map(e=>esc(e)).join(' · ');
  return `<div class="card">
    <div class="ptop">
      <div><b>${esc(x.axis)}</b> · <span class="val">${esc(x.value)}</span></div>
      <div class="pills">
        <span class="pill ${tierCls}">${esc(x.tier)}</span>
        <span class="pill ${(x.method||'').startsWith('llm')?'llm':''}">${esc(x.method)}</span>
        <span class="sup">${esc(x.support)}</span>
      </div>
    </div>
    ${x.statement ? `<div class="s">${esc(x.statement)}</div>`:''}
    <div class="ev">${conv}${ev?` · ${ev}`:''}</div>
    ${ce ? `<div class="counter">counterexamples: ${ce}</div>`:''}
  </div>`;
}

// ---------- PM copilot chat (per-repo discussion, streamed from /api/chat) ----------
let CHAT = { sid: null, repo: null, busy: false };
function chatLauncher(on) {
  const b = $('chatLaunch'); if (!b) return;
  b.classList.toggle('show', !!on && !$('chatPanel').classList.contains('open'));
}
async function openChat() {
  if (!S || !S.repo) return;
  if (CHAT.repo !== S.repo) { CHAT = { sid: null, repo: S.repo, busy: false }; $('chatMsgs').innerHTML = ''; }
  $('chatPanel').classList.add('open'); $('chatLaunch').classList.remove('show');
  await chatGate();
}
// Decide sign-in vs composer based on /api/auth/me; when auth is off, open as normal.
async function chatGate() {
  let me = { enabled: false, authed: true };
  try { me = await (await fetch('/api/auth/me')).json(); } catch (e) {}
  const compose = $('chatCompose');
  if (me.enabled && !me.authed) {
    $('chatUser').textContent = '';
    compose.style.display = 'none';
    const ret = encodeURIComponent(location.pathname + location.search);
    $('chatMsgs').innerHTML = `<div class="chat-empty">Sign in with GitHub to discuss features for
      <b>${esc(shortRepo(S.repo))}</b>.<br>
      <a class="gh-btn" href="/api/auth/github/login?return_to=${ret}">Sign in with GitHub</a></div>`;
    return;
  }
  compose.style.display = '';
  $('chatUser').textContent = me.login ? '@' + me.login : '';
  if (!$('chatMsgs').children.length || $('chatMsgs').querySelector('.gh-btn')) {
    $('chatMsgs').innerHTML = `<div class="chat-empty">Describe a feature you're weighing for
      <b>${esc(shortRepo(S.repo))}</b>. I'll ground it in this repo's principles and decisions
      and flag anything it collides with — before any code is written.</div>`;
  }
  $('chatInput').focus();
}
function closeChat() {
  const p = $('chatPanel'); if (!p) return;
  p.classList.remove('open');
  chatLauncher(S && S.repo);
}
function chatKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); } }
function _stepLabel(t) {
  return ({ search_norms: 'searching the constitution…', get_governing_principles: 'reading governing principles…',
    read_playbook_doc: 'reading the playbook…', check_feature_conflicts: 'checking for collisions…',
    get_proposal: 're-reading the proposal…' })[t] || 'thinking…';
}
function _chatScroll() { const m = $('chatMsgs'); if (m) m.scrollTop = m.scrollHeight; }
function _addMsg(role, text) {
  const d = document.createElement('div'); d.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
  if (role === 'user') d.textContent = text; else d.innerHTML = `<div class="md"></div>`;
  $('chatMsgs').appendChild(d); _chatScroll(); return d;
}
function _chips(findings) {
  const w = document.createElement('div'); w.className = 'chips';
  w.innerHTML = findings.slice(0, 8).map(f => {
    const v = (f.verdict || '').toLowerCase();
    return `<span class="chip ${v}" title="${esc(f.norm || '')}">${esc(v)}: ${esc((f.norm || '').slice(0, 44))}</span>`;
  }).join('');
  return w;
}
async function sendChat() {
  if (CHAT.busy || !S || !S.repo) return;
  const inp = $('chatInput'), text = (inp.value || '').trim(); if (!text) return;
  const empty = $('chatMsgs').querySelector('.chat-empty'); if (empty) empty.remove();
  inp.value = ''; CHAT.busy = true; CHAT.repo = S.repo;
  _addMsg('user', text);
  const bot = _addMsg('bot', ''), md = bot.querySelector('.md');
  const step = document.createElement('div'); step.className = 'chat-step'; $('chatMsgs').appendChild(step);
  let answer = '';
  try {
    const r = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ repo_url: S.repo, message: text, session_id: CHAT.sid, persona: $('chatPersona').value }) });
    if (!r.ok || !r.body) throw new Error('HTTP ' + r.status);
    const rd = r.body.getReader(), dec = new TextDecoder(); let buf = '';
    for (;;) {
      const { value, done } = await rd.read(); if (done) break;
      buf += dec.decode(value, { stream: true }); let i;
      while ((i = buf.indexOf('\n\n')) >= 0) {
        const frame = buf.slice(0, i); buf = buf.slice(i + 2);
        const dl = frame.split('\n').find(l => l.startsWith('data:')); if (!dl) continue;
        const ev = JSON.parse(dl.slice(5).trim());
        if (ev.type === 'token') { answer += ev.text; md.innerHTML = marked.parse(answer); _chatScroll(); }
        else if (ev.type === 'step') { step.innerHTML = ev.status === 'running' ? `<span class="dot"></span><span>${_stepLabel(ev.tool)}</span>` : ''; }
        else if (ev.type === 'done') {
          CHAT.sid = ev.session_id || CHAT.sid; step.remove();
          md.innerHTML = marked.parse(ev.text || answer || '…');
          if (ev.conflict_findings && ev.conflict_findings.length) bot.appendChild(_chips(ev.conflict_findings));
          _chatScroll();
        } else if (ev.type === 'error') { step.remove(); md.innerHTML = `<span style="color:#f85149">${esc(ev.detail || 'error')}</span>`; }
      }
    }
  } catch (e) { step.remove(); md.innerHTML = `<span style="color:#f85149">${esc(e.message || e)}</span>`; }
  finally { CHAT.busy = false; }
}

route();   // boot: ?repo= → view, else landing
// returning from GitHub OAuth (?auth=ok) → reopen the chat once the repo loads
if (new URLSearchParams(location.search).get('auth') === 'ok') {
  const t = setInterval(() => { if (S && S.repo && $('chatLaunch')) { clearInterval(t); openChat(); } }, 200);
  setTimeout(() => clearInterval(t), 4000);
}
</script>
</body>
</html>
