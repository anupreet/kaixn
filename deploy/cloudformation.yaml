AWSTemplateFormatVersion: "2010-09-09"
Description: >
  kaixn — web app on ECS Fargate behind an ALB, backed by RDS PostgreSQL
  (pgvector + ltree). API keys live in Secrets Manager. One stack, end to end.

Parameters:
  ContainerImage:
    Type: String
    Description: ECR image URI (e.g. 1234.dkr.ecr.us-east-1.amazonaws.com/kaixn:latest)
  KaixnEmbedder:
    Type: String
    Default: openai
    AllowedValues: [fake, openai, ollama]
    Description: Embedding backend. 'openai' needs OpenAiApiKey + gives 1536-dim semantic retrieval.
  AnthropicApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Enables LLM synthesis/adjudication. Blank = offline mode.
  OpenAiApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Required only when KaixnEmbedder=openai.
  DBUsername:
    Type: String
    Default: kaixn
  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: RDS master password (alphanumeric recommended).
  DBInstanceClass:
    Type: String
    Default: db.t3.micro
  DesiredCount:
    Type: Number
    Default: 1

Resources:
  # --- Network ---------------------------------------------------------------
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{ Key: Name, Value: !Sub "${AWS::StackName}-vpc" }]

  InternetGateway:
    Type: AWS::EC2::InternetGateway
  GatewayAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  SubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
  SubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: GatewayAttach
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
  AssocA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { RouteTableId: !Ref RouteTable, SubnetId: !Ref SubnetA }
  AssocB:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { RouteTableId: !Ref RouteTable, SubnetId: !Ref SubnetB }

  # --- Security groups -------------------------------------------------------
  AlbSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB ingress (HTTP)
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 80, ToPort: 80, CidrIp: 0.0.0.0/0 }
  ServiceSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Fargate tasks (app port from ALB only)
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 8000, ToPort: 8000, SourceSecurityGroupId: !Ref AlbSg }
  DbSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Postgres (from Fargate tasks only)
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 5432, ToPort: 5432, SourceSecurityGroupId: !Ref ServiceSg }

  # --- Database --------------------------------------------------------------
  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: kaixn db subnets
      SubnetIds: [!Ref SubnetA, !Ref SubnetB]

  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      Engine: postgres
      EngineVersion: "16.4"
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: "20"
      DBName: kaixn
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      DBSubnetGroupName: !Ref DbSubnetGroup
      VPCSecurityGroups: [!Ref DbSg]
      PubliclyAccessible: false
      StorageType: gp3
      BackupRetentionPeriod: 1

  # --- Secrets ---------------------------------------------------------------
  AppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}-secrets"
      SecretString: !Sub |
        {"ANTHROPIC_API_KEY":"${AnthropicApiKey}","OPENAI_API_KEY":"${OpenAiApiKey}","DB_PASSWORD":"${DBPassword}"}

  # --- Logs ------------------------------------------------------------------
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${AWS::StackName}"
      RetentionInDays: 14

  # --- IAM -------------------------------------------------------------------
  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: read-secrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref AppSecret
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole

  # --- ECS -------------------------------------------------------------------
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${AWS::StackName}-cluster"

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${AWS::StackName}-task"
      Cpu: "512"
      Memory: "1024"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: kaixn
          Image: !Ref ContainerImage
          Essential: true
          PortMappings:
            - { ContainerPort: 8000, Protocol: tcp }
          Environment:
            - { Name: KAIXN_EMBEDDER, Value: !Ref KaixnEmbedder }
            - { Name: DB_HOST, Value: !GetAtt Database.Endpoint.Address }
            - { Name: DB_PORT, Value: !GetAtt Database.Endpoint.Port }
            - { Name: DB_USER, Value: !Ref DBUsername }
            - { Name: DB_NAME, Value: kaixn }
            - { Name: PORT, Value: "8000" }
          Secrets:
            - { Name: ANTHROPIC_API_KEY, ValueFrom: !Sub "${AppSecret}:ANTHROPIC_API_KEY::" }
            - { Name: OPENAI_API_KEY, ValueFrom: !Sub "${AppSecret}:OPENAI_API_KEY::" }
            - { Name: DB_PASSWORD, ValueFrom: !Sub "${AppSecret}:DB_PASSWORD::" }
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: kaixn

  # --- Load balancer ---------------------------------------------------------
  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Type: application
      Scheme: internet-facing
      Subnets: [!Ref SubnetA, !Ref SubnetB]
      SecurityGroups: [!Ref AlbSg]
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref Vpc
      Port: 8000
      Protocol: HTTP
      TargetType: ip
      HealthCheckPath: /api/health
      HealthCheckIntervalSeconds: 15
      HealthyThresholdCount: 2
      Matcher: { HttpCode: "200" }
  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - { Type: forward, TargetGroupArn: !Ref TargetGroup }

  Service:
    Type: AWS::ECS::Service
    DependsOn: Listener
    Properties:
      Cluster: !Ref Cluster
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      TaskDefinition: !Ref TaskDefinition
      HealthCheckGracePeriodSeconds: 120
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: [!Ref SubnetA, !Ref SubnetB]
          SecurityGroups: [!Ref ServiceSg]
      LoadBalancers:
        - { ContainerName: kaixn, ContainerPort: 8000, TargetGroupArn: !Ref TargetGroup }

Outputs:
  Url:
    Description: kaixn UI
    Value: !Sub "http://${Alb.DNSName}"
  DatabaseEndpoint:
    Value: !GetAtt Database.Endpoint.Address
